<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediNest Shopping - Maintenance</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#d1fae5] flex items-center justify-center min-h-screen font-sans">

  <div class="bg-white shadow-xl rounded-2xl p-10 text-center max-w-lg">

    <!-- Logo / Title -->
    <h1 class="text-4xl font-bold text-[#0f766e] mb-2">
      MediNest<span class="text-green-400">+</span>
    </h1>

    <!-- Module Name -->
    <h2 class="text-xl font-semibold text-gray-700 mb-4">
      Shopping Service
    </h2>

    <!-- Maintenance Icon -->
    <div class="text-6xl mb-4">
      🛠️
    </div>

    <!-- Message -->
    <h3 class="text-2xl font-bold text-[#0f766e] mb-3">
      Under Maintenance
    </h3>

    <p class="text-gray-600 mb-6">
      Our shopping services are currently under maintenance.  
      We are working to bring you a better experience very soon.
    </p>

    <!-- Back Button -->
    <a 
      href="../index.html"
      class="inline-block bg-[#0f766e] text-white px-6 py-2 rounded-lg hover:bg-[#0d6f63] transition">
      Back to Home
    </a>

  </div>

</body>
</html>
