<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cart | MediNest</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#d1fae5] p-6">

<h1 class="text-3xl font-bold text-center text-[#0f766e] mb-6">Your Cart</h1>

<div class="max-w-4xl mx-auto bg-white rounded-lg shadow p-6">

  <!-- ITEM -->
  <div class="flex justify-between items-center border-b pb-4 mb-4">
    <div>
      <h4 class="font-semibold">Paracetamol Tablets</h4>
      <p class="text-sm text-gray-500">₹50</p>
    </div>

    <div class="flex items-center gap-3">
      <button class="px-2 bg-gray-200">-</button>
      <span>1</span>
      <button class="px-2 bg-gray-200">+</button>
    </div>
  </div>

  <!-- TOTAL -->
  <div class="flex justify-between font-bold text-lg">
    <span>Total</span>
    <span>₹50</span>
  </div>

  <button class="w-full mt-6 bg-[#0f766e] text-white py-2 rounded-lg">
    Proceed to Checkout
  </button>

</div>

</body>
</html>
